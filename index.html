<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>DANBO World</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="style.css?v=20260713.1">
</head>
<body>
<div id="game-container">
  <div id="three-root"></div>

  <!-- Title screen — SF2 style animated intro -->
  <div id="start-screen" class="screen active">
    <canvas id="intro-canvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
    <div id="engine-loader" class="engine-loader">
      <div class="engine-loader-egg">🥚</div>
      <div id="engine-loader-text" class="engine-loader-text">Loading...</div>
      <div class="engine-loader-bar"><span id="engine-loader-fill"></span></div>
    </div>
    <div id="intro-ui" style="position:absolute;bottom:12%;left:0;right:0;text-align:center;z-index:2;">
      <p class="version-text" id="intro-version"></p>
      <button id="start-btn" class="btn btn-primary" style="opacity:0;transition:opacity 0.5s;">🎮 Start Game</button>
    </div>
  </div>

  <!-- Character select — SF2 style -->
  <!-- Character select — SF2 World Warrior style -->
  <div id="select-screen" class="screen">
    <div class="sf2-select-top">
      <div class="sf2-char-name" id="sf2-char-name">SELECT YOUR FIGHTER</div>
    </div>
    <div class="sf2-select-main">
      <div class="sf2-portrait-area">
        <canvas id="portrait-canvas" width="220" height="260"></canvas>
        <div class="sf2-country-flag" id="sf2-country-flag"></div>
      </div>
      <div class="sf2-map-area">
        <canvas id="sf2-map-canvas" width="400" height="220"></canvas>
      </div>
    </div>
    <div class="sf2-grid-area">
      <div class="char-grid" id="char-grid"></div>
    </div>
    <button id="confirm-btn" class="btn btn-primary">⚔️ Confirm</button>
    <!-- Airplane animation overlay -->
    <canvas id="sf2-plane-canvas" width="400" height="300" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:none;z-index:15;"></canvas>
  </div>

  <!-- Portal prompt -->
  <div id="portal-prompt" class="portal-prompt" style="display:none">
    <span id="portal-prompt-text"></span>
  </div>

  <!-- Portal confirm dialog -->
  <div id="portal-confirm" class="portal-confirm" style="display:none">
    <div class="portal-confirm-box">
      <div id="portal-confirm-name" class="portal-confirm-name"></div>
      <div id="portal-confirm-desc" class="portal-confirm-desc"></div>
      <div class="portal-confirm-btns">
        <button id="portal-yes" class="btn btn-primary">✅ Enter (Y/Enter)</button>
        <button id="portal-no" class="btn portal-btn-no">❌ Cancel (N/ESC)</button>
      </div>
    </div>
  </div>

  <!-- Sound & language toggles -->
  <div id="sound-controls" style="position:absolute;top:8px;right:8px;z-index:20;display:flex;gap:clamp(2px,1vw,6px);flex-wrap:wrap;justify-content:flex-end;max-width:50vw;">
    <button id="gamepad-btn" class="sound-toggle" title="Virtual Buttons">🎮</button>
    <button id="lang-btn" class="sound-toggle" title="Language">🌐</button>
    <button id="music-btn" class="sound-toggle" title="Music">🎵</button>
    <button id="sfx-btn" class="sound-toggle" title="SFX">🔊</button>
  </div>

  <!-- SOTN area name reveal -->
  <div id="area-name-overlay" class="area-name-overlay" style="display:none;">
    <div class="area-name-text" id="area-name-text"></div>
  </div>

  <!-- City HUD -->
  <div id="city-hud" class="hidden">
    <div class="hud-top">
      <span class="hud-pill" id="city-name-hud">🏙️ Egg City</span>
      <span class="hud-pill" id="coin-hud">⭐ 0</span>
      <span class="hud-pill hud-desktop-only">F Grab/Throw | Hold to Charge</span>
      <span class="hud-pill hud-desktop-only" id="zoom-hud">Scroll Zoom</span>
      <button class="hud-pill hud-btn" id="view-mode-btn">📷 Normal</button>
      <button class="hud-pill hud-btn" id="spectator-btn" style="display:none;">👁 Spectator</button>
      <button class="hud-pill hud-btn" id="pf-back-btn" style="display:none;">🏙️ Back</button>
    </div>
  </div>

  <!-- Race countdown — Mario Maker style -->
  <div id="round-screen" class="screen">
    <canvas id="round-canvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
    <div class="round-card" style="z-index:2;position:relative;">
      <p class="round-label" id="round-label">Round 1</p>
      <h2 id="round-name">Crazy Course</h2>
      <p class="round-desc" id="round-desc">Rush to the finish!</p>
      <div class="player-count" id="player-count">🥚 × 20</div>
      <div class="countdown" id="countdown">3</div>
    </div>
  </div>

  <!-- Race HUD -->
  <div id="race-hud" class="hidden">
    <div class="hud-top">
      <span class="hud-pill" id="round-hud">🏆 Round 1</span>
      <span class="hud-pill" id="alive-hud">🥚 20</span>
      <span class="hud-pill" id="place-hud">📍 #1</span>
      <span class="hud-pill" id="race-coin-hud">🪙 0</span>
      <button id="race-back-btn" class="hud-pill hud-btn">🏙️ Back</button>
    </div>
    <div class="hud-progress">
      <div class="pbar-bg"><div class="pbar-fill" id="pbar-fill"></div><div class="pbar-flag">🏁</div></div>
    </div>
  </div>

  <!-- Race result -->
  <div id="result-screen" class="screen">
    <div class="result-card">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <h2 id="result-title">Done!</h2>
      <p class="result-sub" id="result-sub"></p>
      <button id="back-city-btn" class="btn btn-primary">🏙️ Back to City</button>
    </div>
  </div>

  <!-- Touch controls -->
  <div id="touch-controls" class="hidden">
    <div id="joystick-area"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
    <button id="grab-btn" class="touch-grab">Grab</button>
    <button id="jump-btn" class="touch-jump">Jump</button>
    <button id="punch-btn" class="touch-punch">拳</button>
    <button id="kick-btn" class="touch-kick">脚</button>
    <button id="chat-btn" class="touch-chat">💬</button>
    <button id="tps-btn" class="touch-tps">📷</button>
    <button id="tps-recenter-btn" class="touch-tps-re">🔄</button>
  </div>
</div>

<script>
(function(){
  var cache='v=20260713.1';
  window.DANBO_ASSET_VERSION=cache;
  window.DANBO_CITY_LOAD_MODE='wasm';
  var warmStart=false;
  try{warmStart=localStorage.getItem('danbo_loader_version')===cache;}catch(e){}
  var loaderLang=(function(){
    var mode='auto';
    try{mode=localStorage.getItem('danbo_lang')||'auto';}catch(e){}
    if(['zhs','zht','ja','en'].indexOf(mode)>=0)return mode;
    var nav=(navigator.language||navigator.userLanguage||'en').toLowerCase();
    if(nav.indexOf('zh-tw')===0||nav.indexOf('zh-hant')===0||nav.indexOf('zh-hk')===0)return 'zht';
    if(nav.indexOf('zh')===0)return 'zhs';
    if(nav.indexOf('ja')===0)return 'ja';
    return 'en';
  })();
  document.documentElement.lang=loaderLang==='zhs'?'zh-CN':loaderLang==='zht'?'zh-TW':loaderLang==='ja'?'ja':'en';
  var loaderI18N={
    loading:{zhs:'3D引擎加载中...',zht:'3D引擎載入中...',ja:'3Dエンジン読み込み中...',en:'Loading 3D engine...'},
    loadingAssets:{zhs:'游戏启动中...',zht:'遊戲啟動中...',ja:'ゲーム起動中...',en:'Starting game...'},
    cached:{zhs:'从缓存快速启动...',zht:'從快取快速啟動...',ja:'キャッシュから高速起動中...',en:'Fast start from cache...'},
    ready:{zhs:'准备好了',zht:'準備好了',ja:'準備完了',en:'Ready'},
    loadFail:{zhs:'加载失败，请刷新',zht:'載入失敗，請重新整理',ja:'読み込み失敗。リロードしてください',en:'Load failed, please refresh'}
  };
  function loaderText(key,data){
    var item=loaderI18N[key];
    var text=item?(item[loaderLang]||item.en):key;
    if(data)text=text.replace(/\{(\w+)\}/g,function(_,k){return data[k]!==undefined?data[k]:'';});
    return text;
  }
  var threeUrls=[
    'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js',
    'https://unpkg.com/three@0.160.0/build/three.min.js'
  ];
  var gameFiles=[
    'js/core.js',
    'js/wasm.js',
    'js/minigame-wasm.js',
    'js/data-characters.js',
    'js/net-client.js',
    'js/plugin-host.js',
    'js/minigame-bridge.js',
    'js/data-cities.js',
    'js/cities/registry.js',
    'js/cities/common-layout.js',
    'js/cities/index.js',
    'js/cities/wasm-city-loader.js',
    'js/data-races.js',
    'js/moves.js',
    'js/intro.js',
    'js/audio.js',
    'js/renderer.js',
    'js/postfx.js',
    'js/visuals.js',
    'js/characters.js',
    'js/ui.js',
    'js/hud.js',
    'js/input.js',
    'js/entity.js',
    'js/city.js',
    'js/world.js',
    'js/map.js',
    'js/interior.js',
    'js/cosmetics.js',
    'js/physics.js',
    'js/ai.js',
    'js/player.js',
    'js/camera.js',
    'js/gameloop.js',
    'js/main.js'
  ];
  function setEngineLoading(text,percent,data){
    var el=document.getElementById('engine-loader');
    var txt=document.getElementById('engine-loader-text');
    var fill=document.getElementById('engine-loader-fill');
    if(el)el.classList.remove('engine-loader-hidden');
    if(txt)txt.textContent=loaderText(warmStart&&text==='loadingAssets'?'cached':text,data);
    if(fill)fill.style.width=Math.max(0,Math.min(100,percent||0))+'%';
  }
  function hideEngineLoading(){
    var el=document.getElementById('engine-loader');
    if(el)el.classList.add('engine-loader-hidden');
  }
  function setStartText(text){
    var btn=document.getElementById('start-btn');
    if(btn)btn.textContent=loaderText(text);
    setEngineLoading(text,100);
  }
  function loadScript(src,onload,onerror){
    var s=document.createElement('script');
    s.src=src;
    s.onload=onload;
    s.onerror=onerror;
    document.body.appendChild(s);
  }
  function finishGameLoading(){
    try{localStorage.setItem('danbo_loader_version',cache);}catch(e){}
    setEngineLoading('ready',100);setTimeout(hideEngineLoading,warmStart?80:250);
  }
  var manifestFile='plugins/manifest.js';
  var pluginFiles=[];
  var entranceFiles=[];
  var finalAssetTotal=0;
  var manifestLoadedCount=0;
  var entranceLoadedCount=0;
  function collectPluginFiles(){
    var list=[];
    (window.DANBO_PLUGIN_MANIFEST||[]).forEach(function(p){
      if(!p||p.enabled===false)return;
      if(Array.isArray(p.scripts))p.scripts.forEach(function(src){if(src)list.push(src);});
      else if(p.script)list.push(p.script);
    });
    return list;
  }
  function collectEntranceFiles(){
    var list=[];
    (window.DANBO_PLUGIN_MANIFEST||[]).forEach(function(p){
      if(!p||p.enabled===false)return;
      if(Array.isArray(p.entranceScripts))p.entranceScripts.forEach(function(src){if(src)list.push(src);});
      else if(p.entranceScript)list.push(p.entranceScript);
    });
    return list;
  }
  function assetProgress(n){
    var total=finalAssetTotal||Math.max(1,gameFiles.length+pluginFiles.length+entranceFiles.length+manifestLoadedCount);
    return 35+Math.floor(Math.max(0,Math.min(1,n/total))*60);
  }
  function loadEntranceScriptList(i,files,done){
    files=files||[];
    if(i>=files.length){done();return;}
    var doneBeforeEntrance=manifestLoadedCount+gameFiles.indexOf('js/plugin-host.js')+1;
    setEngineLoading('loadingAssets',assetProgress(doneBeforeEntrance+i+1));
    var src=files[i]+'?'+cache;
    loadScript(src,function(){entranceLoadedCount++;loadEntranceScriptList(i+1,files,done);},function(){
      console.error('Failed to load entrance '+src);
      entranceLoadedCount++;loadEntranceScriptList(i+1,files,done);
    });
  }
  function loadPluginScriptList(i,files){
    files=files||[];
    if(i>=files.length){finishGameLoading();return;}
    var doneBeforePlugins=manifestLoadedCount+gameFiles.length;
    setEngineLoading('loadingAssets',assetProgress(doneBeforePlugins+i+1),{n:doneBeforePlugins+i+1,total:finalAssetTotal});
    var src=files[i]+'?'+cache;
    loadScript(src,function(){loadPluginScriptList(i+1,files);},function(){
      console.error('Failed to load plugin '+src);
      loadPluginScriptList(i+1,files);
    });
  }
  function loadPluginsThenFinish(){
    if(window.DANBO_PLUGIN_HOST&&window.DANBO_PLUGIN_HOST.setManifest)window.DANBO_PLUGIN_HOST.setManifest(window.DANBO_PLUGIN_MANIFEST||[]);
    finishGameLoading();
  }
  function loadGameScript(i){
    if(i>=gameFiles.length){loadPluginsThenFinish();return;}
    var n=manifestLoadedCount+entranceLoadedCount+i+1;
    setEngineLoading('loadingAssets',assetProgress(n),{n:n,total:finalAssetTotal});
    var src=gameFiles[i]+'?'+cache;
    loadScript(src,function(){
      if(gameFiles[i]==='js/plugin-host.js'){
        if(window.DANBO_PLUGIN_HOST&&window.DANBO_PLUGIN_HOST.setManifest)window.DANBO_PLUGIN_HOST.setManifest(window.DANBO_PLUGIN_MANIFEST||[]);
        loadEntranceScriptList(0,entranceFiles,function(){loadGameScript(i+1);});
      }else if(gameFiles[i]==='js/cities/wasm-city-loader.js'&&window._danboCityDataReady){
        window._danboCityDataReady.then(function(){loadGameScript(i+1);},function(err){
          console.warn('City data WASM fallback',err);
          loadGameScript(i+1);
        });
      }else{
        loadGameScript(i+1);
      }
    },function(){
      console.error('Failed to load '+src);
      setStartText('loadFail');
    });
  }
  function loadManifestThenGame(){
    setEngineLoading('loading',30);
    loadScript(manifestFile+'?'+cache,function(){
      manifestLoadedCount=1;
      pluginFiles=[];
      entranceFiles=collectEntranceFiles();
      entranceLoadedCount=0;
      finalAssetTotal=manifestLoadedCount+gameFiles.length+entranceFiles.length;
      loadGameScript(0);
    },function(){
      console.error('Failed to load '+manifestFile);
      manifestLoadedCount=0;pluginFiles=[];entranceFiles=[];entranceLoadedCount=0;finalAssetTotal=gameFiles.length;
      loadGameScript(0);
    });
  }
  function loadThree(i){
    if(typeof THREE!=='undefined'){loadManifestThenGame();return;}
    if(i>=threeUrls.length){setStartText('loadFail');return;}
    setEngineLoading('loading',12+i*10);
    loadScript(threeUrls[i],function(){
      if(typeof THREE==='undefined')loadThree(i+1);
      else loadManifestThenGame();
    },function(){loadThree(i+1);});
  }
  setEngineLoading('loading',4);
  loadThree(0);
})();
</script>
</body>
</html>
