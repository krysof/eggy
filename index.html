<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>DANBO World</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game-container">
  <div id="three-root"></div>

  <!-- Title screen -->
  <div id="start-screen" class="screen active">
    <div class="title-area">
      <div class="egg-bounce">🥚</div>
      <h1>蛋宝世界</h1>
      <p class="subtitle">D A N B O &nbsp; W O R L D</p>
      <p class="slogan-text">探索城市 · 穿越世界 · 一起冒险</p>
      <p class="version-text">v20260327.1</p>
    </div>
    <button id="start-btn" class="btn btn-primary">🎮 Start Game</button>
  </div>

  <!-- Character select — SF2 style -->
  <!-- Character select — SF2 World Warrior style -->
  <div id="select-screen" class="screen">
    <div class="sf2-select-top">
      <div class="sf2-char-name" id="sf2-char-name">SELECT YOUR FIGHTER</div>
    </div>
    <div class="sf2-select-main">
      <div class="sf2-portrait-area">
        <canvas id="portrait-canvas" width="220" height="260"></canvas>
        <div class="sf2-country-flag" id="sf2-country-flag"></div>
      </div>
      <div class="sf2-map-area">
        <canvas id="sf2-map-canvas" width="400" height="220"></canvas>
      </div>
    </div>
    <div class="sf2-grid-area">
      <div class="char-grid" id="char-grid"></div>
    </div>
    <button id="confirm-btn" class="btn btn-primary">⚔️ Confirm</button>
    <!-- Airplane animation overlay -->
    <canvas id="sf2-plane-canvas" width="400" height="300" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:none;z-index:15;"></canvas>
  </div>

  <!-- Portal prompt -->
  <div id="portal-prompt" class="portal-prompt" style="display:none">
    <span id="portal-prompt-text"></span>
  </div>

  <!-- Portal confirm dialog -->
  <div id="portal-confirm" class="portal-confirm" style="display:none">
    <div class="portal-confirm-box">
      <div id="portal-confirm-name" class="portal-confirm-name"></div>
      <div id="portal-confirm-desc" class="portal-confirm-desc"></div>
      <div class="portal-confirm-btns">
        <button id="portal-yes" class="btn btn-primary">✅ Enter (Y/Enter)</button>
        <button id="portal-no" class="btn portal-btn-no">❌ Cancel (N/ESC)</button>
      </div>
    </div>
  </div>

  <!-- Sound & language toggles -->
  <div id="sound-controls" style="position:absolute;top:12px;right:12px;z-index:20;display:flex;gap:6px;">
    <button id="gamepad-btn" class="sound-toggle" title="Virtual Buttons">🎮</button>
    <button id="lang-btn" class="sound-toggle" title="Language">🌐</button>
    <button id="music-btn" class="sound-toggle" title="Music">🎵</button>
    <button id="sfx-btn" class="sound-toggle" title="SFX">🔊</button>
  </div>

  <!-- SOTN area name reveal -->
  <div id="area-name-overlay" class="area-name-overlay" style="display:none;">
    <div class="area-name-text" id="area-name-text"></div>
  </div>

  <!-- City HUD -->
  <div id="city-hud" class="hidden">
    <div class="hud-top">
      <span class="hud-pill" id="city-name-hud">🏙️ Egg City</span>
      <span class="hud-pill" id="coin-hud">⭐ 0</span>
      <span class="hud-pill">F Grab/Throw | Hold to Charge</span>
      <span class="hud-pill" id="zoom-hud">Scroll Zoom</span>
    </div>
  </div>

  <!-- Race countdown -->
  <div id="round-screen" class="screen">
    <div class="round-card">
      <p class="round-label" id="round-label">Round 1</p>
      <h2 id="round-name">Crazy Course</h2>
      <p class="round-desc" id="round-desc">Rush to the finish!</p>
      <div class="player-count" id="player-count">🥚 × 20</div>
      <div class="countdown" id="countdown">3</div>
    </div>
  </div>

  <!-- Race HUD -->
  <div id="race-hud" class="hidden">
    <div class="hud-top">
      <span class="hud-pill" id="round-hud">🏆 Round 1</span>
      <span class="hud-pill" id="alive-hud">🥚 20</span>
      <span class="hud-pill" id="place-hud">📍 #1</span>
      <span class="hud-pill" id="race-coin-hud">🪙 0</span>
      <button id="race-back-btn" class="hud-pill hud-btn">🏙️ Back</button>
    </div>
    <div class="hud-progress">
      <div class="pbar-bg"><div class="pbar-fill" id="pbar-fill"></div><div class="pbar-flag">🏁</div></div>
    </div>
  </div>

  <!-- Race result -->
  <div id="result-screen" class="screen">
    <div class="result-card">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <h2 id="result-title">Done!</h2>
      <p class="result-sub" id="result-sub"></p>
      <button id="back-city-btn" class="btn btn-primary">🏙️ Back to City</button>
    </div>
  </div>

  <!-- Touch controls -->
  <div id="touch-controls" class="hidden">
    <div id="joystick-area"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
    <button id="grab-btn" class="touch-grab">Grab</button>
    <button id="jump-btn" class="touch-jump">Jump</button>
    <button id="punch-btn" class="touch-punch">拳</button>
    <button id="kick-btn" class="touch-kick">脚</button>
    <button id="chat-btn" class="touch-chat">💬</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js" onerror="document.getElementById('start-btn').textContent='Load failed, please refresh';"></script>
<script>
if(typeof THREE==='undefined'){
  document.getElementById('start-btn').textContent='Loading 3D engine...';
  var s=document.createElement('script');
  s.src='https://unpkg.com/three@0.160.0/build/three.min.js';
  s.onload=function(){
    var files=['js/core.js','js/audio.js','js/renderer.js','js/characters.js','js/ui.js','js/hud.js','js/input.js','js/entity.js','js/city.js','js/world.js','js/race.js','js/physics.js','js/ai.js','js/player.js','js/camera.js','js/gameloop.js','js/main.js'];
    (function loadNext(i){if(i>=files.length)return;var g=document.createElement('script');g.src=files[i];g.onload=function(){loadNext(i+1);};document.body.appendChild(g);})(0);
  };
  s.onerror=function(){document.getElementById('start-btn').textContent='Load failed, please refresh';};
  document.body.appendChild(s);
}
</script>
<script src="js/core.js"></script>
<script src="js/audio.js"></script>
<script src="js/renderer.js"></script>
<script src="js/characters.js"></script>
<script src="js/ui.js"></script>
<script src="js/hud.js"></script>
<script src="js/input.js"></script>
<script src="js/entity.js"></script>
<script src="js/city.js"></script>
<script src="js/world.js"></script>
<script src="js/race.js"></script>
<script src="js/physics.js"></script>
<script src="js/ai.js"></script>
<script src="js/player.js"></script>
<script src="js/camera.js"></script>
<script src="js/gameloop.js"></script>
<script src="js/main.js"></script>
</body>
</html>
